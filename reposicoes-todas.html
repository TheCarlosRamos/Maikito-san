<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todas as Reposições - Dashboard Maikito-san</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1><i class="fas fa-calendar"></i> Todas as Reposições</h1>
            <div class="header-nav">
                <button class="btn btn-secondary" onclick="window.location.href='index.html'">
                    <i class="fas fa-arrow-left"></i> Voltar ao Dashboard
                </button>
                <button class="btn btn-secondary" onclick="window.location.href='reposicao.html'">
                    <i class="fas fa-calendar-plus"></i> Nova Reposição
                </button>
                <button class="btn btn-danger" onclick="window.location.href='reposicao-canceladas.html'">
                    <i class="fas fa-calendar-times"></i> Reposições Canceladas
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="filters-section">
            <div class="filter-group">
                <label for="filterData">
                    <i class="fas fa-calendar"></i> Filtrar por Data
                </label>
                <input type="date" id="filterData">
            </div>
            
            <div class="filter-group">
                <label for="filterProfessor">
                    <i class="fas fa-user"></i> Filtrar por Professor
                </label>
                <input type="text" id="filterProfessor" placeholder="Digite o nome do professor...">
            </div>
            
            <div class="filter-group">
                <label for="filterAluno">
                    <i class="fas fa-user-graduate"></i> Filtrar por Aluno
                </label>
                <input type="text" id="filterAluno" placeholder="Digite o nome do aluno...">
            </div>
            
            <div class="filter-group">
                <label for="filterStatus">
                    <i class="fas fa-filter"></i> Filtrar por Status
                </label>
                <select id="filterStatus">
                    <option value="">Todos</option>
                    <option value="pendente">Pendente</option>
                    <option value="confirmado">Confirmado</option>
                    <option value="realizado">Realizado</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="filterTurma">
                    <i class="fas fa-users"></i> Filtrar por Turma
                </label>
                <input type="text" id="filterTurma" placeholder="Digite o nome da turma...">
            </div>
        </section>

        <section class="stats-section">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <div class="stat-content">
                    <h3 id="totalReposicoes">0</h3>
                    <p>Total de Reposições</p>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-content">
                    <h3 id="pendentesCount">0</h3>
                    <p>Pendentes</p>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="stat-content">
                    <h3 id="confirmadosCount">0</h3>
                    <p>Confirmados</p>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-check-double"></i>
                </div>
                <div class="stat-content">
                    <h3 id="realizadosCount">0</h3>
                    <p>Realizados</p>
                </div>
            </div>
        </section>

        <section class="agendamentos-section">
            <div class="section-header">
                <h2><i class="fas fa-list"></i> Lista de Reposições</h2>
                <div class="header-actions">
                    <button class="btn-primary" onclick="sistemaTodas.exportarTodosParaPDF()" title="Exportar todos para PDF">
                        <i class="fas fa-file-pdf"></i> Exportar Tudo
                    </button>
                    <button class="btn-secondary" onclick="sistemaTodas.limparFiltros()" title="Limpar filtros">
                        <i class="fas fa-eraser"></i> Limpar Filtros
                    </button>
                </div>
            </div>
            
            <div class="agendamentos-list" id="todasReposicoesList">
                <!-- Reposições serão inseridas aqui dinamicamente -->
            </div>
        </section>
    </main>

    <!-- Toast de Notificação -->
    <div id="toast" class="toast hidden">
        <div class="toast-content">
            <i class="fas fa-check-circle"></i>
            <span id="toastMessage"></span>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="whatsapp-service.js"></script>
    <script src="reposicoes-todas.js"></script>
</body>
</html>
