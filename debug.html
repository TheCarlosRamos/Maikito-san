<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console de Debug - Dashboard</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #00ff00; }
        .log { padding: 5px; margin: 5px 0; }
        .error { color: #ff4444; }
        .success { color: #44ff44; }
        .info { color: #44ccff; }
    </style>
</head>
<body>
    <h1>🔍 Console de Debug</h1>
    <div id="logs" style="height: 600px; overflow-y: auto; border: 1px solid #00ff00; padding: 10px;"></div>

    <script>
        // Interceptar console
        const originalLog = console.log;
        const originalError = console.error;

        function addLog(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const logEntry = document.createElement('div');
            logEntry.className = `log ${type}`;
            logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.appendChild(logEntry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        console.log = function(...args) {
            addLog(args.join(' '), 'success');
            originalLog.apply(console, args);
        };

        console.error = function(...args) {
            addLog(args.join(' '), 'error');
            originalError.apply(console, args);
        };

        // Capturar erros globais
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            addLog(`ERRO GLOBAL: ${msg} (${url}:${lineNo})`, 'error');
            return false;
        };

        addLog('✅ Debug console inicializado', 'success');
        addLog('Carregando dashboard...', 'info');
    </script>

    <iframe src="index.html" style="position: fixed; top: 0; right: 0; width: 50%; height: 100%; border: none;"></iframe>
</body>
</html>
