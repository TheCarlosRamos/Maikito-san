<!DOCTYPE html>
<html langleeng="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste Fetch JSON</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .result { padding: 15px; margin: 10px 0; border-radius: 5px; border-left: 4px solid; }
        .ok { background: #d4edda; border-color: #28a745; }
        .error { background: #f8d7da; border-color: #dc3545; }
    </style>
</head>
<body>
    <h1>🧪 Teste de Fetch JSON</h1>
    <div id="result"></div>

    <script>
        async function test() {
            const result = document.getElementById('result');
            
            try {
                result.innerHTML = '<div class="result ok">⏳ Tentando buscar dados_organizados.json...</div>';
                
                const response = await fetch('dados_organizados.json');
                result.innerHTML += `<div class="result ok">✅ Fetch retornou status ${response.status}</div>`;
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                result.innerHTML += `<div class="result ok">✅ JSON parseado com sucesso</div>`;
                result.innerHTML += `<div class="result ok">📊 Horários: ${data.horarios?.length || 0}</div>`;
                result.innerHTML += `<div class="result ok">📈 Estatísticas: ${data.estatisticas?.length || 0}</div>`;
                result.innerHTML += `<div class="result ok"><pre>${JSON.stringify(data, null, 2).substring(0, 500)}...</pre></div>`;
                
                // Simular o que o dashboard faz
                result.innerHTML += `<div class="result ok">🔄 Tentando executar tipo de código similar ao dashboard...</div>`;
                
                window.testData = data;
                result.innerHTML += `<div class="result ok">✅ Dados armazenados em window.testData</div>`;
                
            } catch (error) {
                result.innerHTML += `<div class="result error">❌ ERRO: ${error.message}</div>`;
                result.innerHTML += `<div class="result error"><pre>${error.stack}</pre></div>`;
            }
        }
        
        // Executar ao carregar
        window.addEventListener('load', test);
    </script>
</body>
</html>
