<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Dashboard</title>
</head>
<body>
    <h1>Teste de Carregamento</h1>
    <div id="status">Carregando...</div>
    <div id="dados"></div>

    <script>
        async function testLoad() {
            try {
                console.log('Tentando carregar dados_organizados.json...');
                const response = await fetch('dados_organizados.json');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const data = await response.json();
                console.log('Dados carregados:', data);

                document.getElementById('status').textContent = '✅ Dados carregados com sucesso!';
                document.getElementById('dados').innerHTML = `
                    <p>Horários: ${data.horarios ? data.horarios.length : 0}</p>
                    <p>Estatísticas: ${data.estatisticas ? data.estatisticas.length : 0}</p>
                `;
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('status').textContent = `❌ Erro: ${error.message}`;
            }
        }

        testLoad();
    </script>
</body>
</html>
