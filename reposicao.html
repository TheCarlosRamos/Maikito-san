<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento de Reposição</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="header-nav">
                <a href="index.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                    <span>Voltar ao Dashboard</span>
                </a>
                <h1><i class="fas fa-calendar-check"></i> Agendamento de Reposição</h1>
            </div>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input id="searchBox" placeholder="Buscar aluno..." type="text">
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="reposicao-container">
            <!-- Formulário de Agendamento -->
            <section class="form-section">
                <div class="form-card">
                    <h2><i class="fas fa-user-plus"></i> Novo Agendamento</h2>
                    
                    <form id="reposicaoForm" class="reposicao-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="alunoNome">
                                    <i class="fas fa-user"></i> Nome do Aluno
                                </label>
                                <input 
                                    type="text" 
                                    id="alunoNome" 
                                    placeholder="Digite o nome do aluno..."
                                    required
                                >
                            </div>
                            
                            <div class="form-group">
                                <label for="alunoTurma">
                                    <i class="fas fa-users"></i> Turma
                                </label>
                                <input 
                                    type="text" 
                                    id="alunoTurma" 
                                    placeholder="Digite a turma..."
                                    required
                                >
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="alunoProfessor">
                                    <i class="fas fa-chalkboard-teacher"></i> Professor
                                </label>
                                <input 
                                    type="text" 
                                    id="alunoProfessor" 
                                    placeholder="Digite o nome do professor..."
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="alunoEmail">
                                    <i class="fas fa-envelope"></i> E-mail
                                </label>
                                <input 
                                    type="email" 
                                    id="alunoEmail" 
                                    placeholder="email@exemplo.com"
                                    required
                                >
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="alunoTelefone">
                                    <i class="fas fa-phone"></i> Telefone
                                </label>
                                <input 
                                    type="tel" 
                                    id="alunoTelefone" 
                                    placeholder="(DDD) 99999-8888"
                                    pattern="\([0-9]{2}\) [0-9]{5}-[0-9]{4}"
                                    required
                                >
                            </div>
                        </div>

                        <!-- Data da Reposição -->
                        <div class="form-group">
                            <label for="dataReposicao">
                                <i class="fas fa-calendar"></i>
                                Data da Reposição
                            </label>
                            <input type="date" id="dataReposicao" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="motivoReposicao">
                                    <i class="fas fa-comment"></i> Motivo
                                </label>
                                <textarea 
                                    id="motivoReposicao" 
                                    placeholder="Descreva o motivo da reposição..."
                                    rows="3"
                                    required
                                ></textarea>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="alunoTurma">
                                    <i class="fas fa-users"></i> Turma
                                </label>
                                <input 
                                    type="text" 
                                    id="alunoTurma" 
                                    value="Reposição Geral"
                                    readonly
                                    style="background: #f8f9fa; cursor: default;"
                                >
                            </div>

                            <div class="form-group">
                                <label for="horarioSelect">
                                    <i class="fas fa-clock"></i> Horário
                                </label>
                                <div class="select-wrapper">
                                    <select id="horarioSelect" required>
                                        <option value="">Selecione um horário</option>
                                        <option value="08:00">08:00</option>
                                        <option value="09:00">09:00</option>
                                        <option value="10:00">10:00</option>
                                        <option value="11:00">11:00</option>
                                        <option value="14:00">14:00</option>
                                        <option value="15:00">15:00</option>
                                        <option value="16:00">16:00</option>
                                        <option value="17:00">17:00</option>
                                        <option value="18:00">18:00</option>
                                        <option value="19:00">19:00</option>
                                        <option value="20:00">20:00</option>
                                    </select>
                                    <i class="fas fa-chevron-down"></i>
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <div class="checkbox-group">
                                    <input type="checkbox" id="notificarWhatsApp" checked>
                                    <label for="notificarWhatsApp">
                                        <i class="fab fa-whatsapp"></i>
                                        Enviar lembrete por WhatsApp
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Botões de Ação -->
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="limparFormulario()">
                                <i class="fas fa-times"></i>
                                Limpar
                            </button>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-check"></i>
                                Agendar Reposição
                            </button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- Lista de Agendamentos -->
            <section class="agendamentos-section">
                <div class="section-header">
                    <h2><i class="fas fa-list"></i> Agendamentos Realizados</h2>
                    <div class="header-actions">
                        <div class="filter-controls">
                            <input type="date" id="filterData" class="filter-input">
                            <select id="filterStatus" class="filter-input">
                                <option value="">Todos os status</option>
                                <option value="pendente">Pendente</option>
                                <option value="confirmado">Confirmado</option>
                                <option value="realizado">Realizado</option>
                                <option value="cancelado">Cancelado</option>
                            </select>
                        </div>
                        <button class="btn-primary" onclick="sistemaReposicao.exportarTodosParaPDF()" title="Exportar todos para PDF">
                            <i class="fas fa-file-pdf"></i> Exportar Tudo
                        </button>
                    </div>
                </div>
                
                <div class="agendamentos-list" id="agendamentosList">
                    <!-- Agendamentos serão inseridos aqui dinamicamente -->
                </div>
            </section>
        </div>
    </main>

    <!-- Modal de Confirmação -->
    <div id="confirmModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-check-circle"></i> Confirmar Agendamento</h3>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="confirmation-details">
                    <h4>Resumo do Agendamento:</h4>
                    <div id="confirmDetails"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="confirmarAgendamento()">
                    <i class="fas fa-check"></i> Confirmar
                </button>
            </div>
        </div>
    </div>

    <!-- Toast de Notificação -->
    <div id="toast" class="toast hidden">
        <div class="toast-content">
            <i class="fas fa-check-circle"></i>
            <span id="toastMessage"></span>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="whatsapp-service.js"></script>
    <script src="reposicao.js"></script>
</body>
</html>
