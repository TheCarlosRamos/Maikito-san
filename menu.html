<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 Menu - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }
        
        .subtitle {
            color: #718096;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .menu-item {
            padding: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .menu-item:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
            transform: translateX(5px);
        }
        
        .icon {
            font-size: 1.5rem;
        }
        
        .menu-item.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }
        
        .menu-item.primary:hover {
            border: none;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .status {
            margin-top: 30px;
            padding: 15px;
            background: #f7fafc;
            border-radius: 8px;
            border-left: 4px solid #48bb78;
            color: #22543d;
            font-size: 0.9rem;
        }
        
        .status.error {
            background: #fed7d7;
            border-left-color: #c53030;
            color: #742a2a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Dashboard</h1>
        <p class="subtitle">Escolha uma opção:</p>
        
        <div class="menu">
            <a href="index.html" class="menu-item primary">
                <span class="icon">🎯</span>
                <span>Dashboard Principal</span>
            </a>
            
            <a href="simples.html" class="menu-item">
                <span class="icon">📱</span>
                <span>Versão Simples</span>
            </a>
            
            <a href="teste-fetch.html" class="menu-item">
                <span class="icon">🧪</span>
                <span>Teste Fetch JSON</span>
            </a>
            
            <a href="diagnostico.html" class="menu-item">
                <span class="icon">🔍</span>
                <span>Diagnóstico Completo</span>
            </a>
            
            <a href="debug.html" class="menu-item">
                <span class="icon">🐛</span>
                <span>Debug Console</span>
            </a>
        </div>
        
        <div class="status">
            ✅ Servidor HTTP ativo na porta 8000
        </div>
    </div>
</body>
</html>
