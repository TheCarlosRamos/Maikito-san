<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot IA Maikito-san - SMART 2.0</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 95%;
            max-width: 1000px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
            position: relative;
        }

        .chat-header h1 {
            font-size: 1.8em;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .chat-header p {
            opacity: 0.95;
            font-size: 1em;
            font-weight: 300;
        }

        .status-indicator {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 12px;
            height: 12px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-indicator.disconnected {
            background: #ef4444;
            animation: none;
        }

        .status-indicator.connecting {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        .chat-messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            background: #f8f9fa;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            animation: fadeInUp 0.3s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 75%;
            padding: 15px 20px;
            border-radius: 20px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 15px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .message.bot .message-content {
            background: white;
            color: #2c3e50;
            border: 1px solid #e1e8ed;
            border-bottom-left-radius: 6px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .message-content h1,
        .message-content h2,
        .message-content h3,
        .message-content h4 {
            margin-bottom: 12px;
            color: #667eea;
            font-weight: 600;
        }

        .message-content strong {
            color: #2c3e50;
            font-weight: 600;
        }

        .message-content em {
            color: #7f8c8d;
            font-style: italic;
        }

        .typing-indicator {
            display: none;
            padding: 15px 20px;
            color: #7f8c8d;
            font-style: italic;
            text-align: center;
        }

        .chat-input {
            padding: 20px 25px;
            background: white;
            border-top: 1px solid #e1e8ed;
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e1e8ed;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        #messageInput:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #messageInput:disabled {
            background: #f8f9fa;
            cursor: not-allowed;
        }

        #sendButton {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        #sendButton:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        #sendButton:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .examples {
            padding: 20px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid #dee2e6;
        }

        .examples-title {
            font-weight: 600;
            color: #495057;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .example-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        .example-btn {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            text-align: left;
            line-height: 1.4;
        }

        .example-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .example-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .connection-status {
            padding: 10px;
            text-align: center;
            background: #fef3c7;
            border: 1px solid #f59e0b;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .connection-status.connected {
            background: #d1fae5;
            border-color: #10b981;
            color: #065f46;
        }

        .connection-status.error {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }

        @media (max-width: 768px) {
            .chat-container {
                width: 98%;
                height: 95vh;
                border-radius: 15px;
            }

            .message-content {
                max-width: 85%;
                font-size: 14px;
            }

            .example-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="status-indicator" id="statusIndicator"></div>
            <h1> Maikito-san</h1>
            <p> Inteligência Avançada </p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="connection-status" id="connectionStatus">
                🔴 Conectando ao servidor ...
            </div>

            <div class="examples" id="examples" style="display: none;">
                <div class="examples-title">Exemplos com Inteligência SMART 2.0:</div>
                <div class="example-grid">
                    <button class="example-btn" onclick="sendExample('Professor Maycon')">
                        👨‍🏫 Turmas do Maycon
                    </button>
                    <button class="example-btn" onclick="sendExample('Turmas KIDS')">
                        🧒👧 Turmas KIDS
                    </button>
                    <button class="example-btn" onclick="sendExample('Quantas reposições tivemos em agosto?')">
                        📅 Reposições agosto
                    </button>
                    <button class="example-btn" onclick="sendExample('Reposição do aluno Nicolas Ferreira')">
                        👤 Reposição Nicolas Ferreira
                    </button>
                    <button class="example-btn" onclick="sendExample('Turmas INT')">
                        📚 Turmas INT
                    </button>
                    <button class="example-btn" onclick="sendExample('Resumo de reposições de outubro')">
                        📊 Resumo outubro
                    </button>
                    <button class="example-btn" onclick="sendExample('Professor Carlos Sábado')">
                        🧑‍🏫 Carlos Sábado
                    </button>
                    <button class="example-btn" onclick="sendExample('Agenda da turma LK 4 A')">
                        ⏰ Agenda LK 4 A
                    </button>
                </div>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            Processando com inteligência SMART...
        </div>

        <div class="chat-input">
            <div class="input-container">
                <input type="text" id="messageInput"
                    placeholder="Digite sua pergunta (SMART 2.0 + Inteligência Avançada)..."
                    onkeypress="handleKeyPress(event)" disabled>
                <button id="sendButton" onclick="sendMessage()" disabled>Enviar</button>
            </div>
        </div>
    </div>

    <script>
        let websocket = null;
        let isConnected = false;

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.hostname}:8000/ws/chat`;

            try {
                websocket = new WebSocket(wsUrl);

                websocket.onopen = function (event) {
                    console.log('Conectado ao WebSocket');
                    isConnected = true;
                    updateConnectionStatus('connected', '🟢 Conectado ao SMART 2.0!');
                    enableInput(true);
                };

                websocket.onmessage = function (event) {
                    const data = JSON.parse(event.data);

                    if (data.type === 'status') {
                        showTyping();
                    } else if (data.type === 'response') {
                        hideTyping();
                        addMessage(data.message, false);
                    }
                };

                websocket.onclose = function (event) {
                    console.log('WebSocket desconectado');
                    isConnected = false;
                    updateConnectionStatus('disconnected', '🔴 Conexão perdida. Tentando reconectar...');
                    enableInput(false);

                    // Tentar reconectar após 3 segundos
                    setTimeout(connectWebSocket, 3000);
                };

                websocket.onerror = function (error) {
                    console.error('Erro no WebSocket:', error);
                    updateConnectionStatus('error', '❌ Erro na conexão com o servidor SMART');
                    enableInput(false);
                };

            } catch (error) {
                console.error('Erro ao criar WebSocket:', error);
                updateConnectionStatus('error', '❌ Não foi possível conectar ao servidor SMART');
                enableInput(false);
            }
        }

        function updateConnectionStatus(status, message) {
            const statusElement = document.getElementById('connectionStatus');
            const indicatorElement = document.getElementById('statusIndicator');

            statusElement.className = `connection-status ${status}`;
            statusElement.textContent = message;

            indicatorElement.className = `status-indicator ${status === 'connected' ? '' : status === 'connecting' ? 'connecting' : 'disconnected'}`;

            if (status === 'connected') {
                document.getElementById('examples').style.display = 'block';
            }
        }

        function enableInput(enabled) {
            document.getElementById('messageInput').disabled = !enabled;
            document.getElementById('sendButton').disabled = !enabled;

            const buttons = document.querySelectorAll('.example-btn');
            buttons.forEach(btn => btn.disabled = !enabled);

            if (enabled) {
                document.getElementById('messageInput').focus();
            }
        }

        function addMessage(content, isUser = false) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;

            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';

            // Processar markdown básico
            let processedContent = content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/_(.*?)_/g, '<em>$1</em>')
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                .replace(/\n/g, '<br>');

            messageContent.innerHTML = processedContent;
            messageDiv.appendChild(messageContent);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTyping() {
            document.getElementById('typingIndicator').style.display = 'block';
        }

        function hideTyping() {
            document.getElementById('typingIndicator').style.display = 'none';
        }

        function sendMessage() {
            if (!isConnected) {
                addMessage('❌ Sem conexão com o servidor RAG', false);
                return;
            }

            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            addMessage(message, true);
            input.value = '';

            websocket.send(JSON.stringify({ message: message }));
        }

        function sendExample(message) {
            document.getElementById('messageInput').value = message;
            sendMessage();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Iniciar conexão ao carregar a página
        document.addEventListener('DOMContentLoaded', () => {
            updateConnectionStatus('connecting', '🟡 Conectando ao servidor RAG...');
            connectWebSocket();
        });
    </script>
</body>

</html>
